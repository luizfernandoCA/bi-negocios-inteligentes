<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 120" role="img" aria-label="Negócios Inteligentes">
  <defs>
    <linearGradient id="niMark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2bd4f0"/>
      <stop offset="1" stop-color="#123cc8"/>
    </linearGradient>
    <linearGradient id="niBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#9becff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Mark: rounded square, rising bars resolving into a connected node (data -> intelligence) -->
  <rect x="4" y="14" width="92" height="92" rx="24" fill="url(#niMark)"/>
  <rect x="24" y="64" width="13" height="26" rx="4" fill="url(#niBar)" opacity="0.9"/>
  <rect x="43" y="50" width="13" height="40" rx="4" fill="url(#niBar)" opacity="0.95"/>
  <rect x="62" y="36" width="13" height="54" rx="4" fill="url(#niBar)"/>
  <!-- intelligence node + links -->
  <circle cx="68.5" cy="30" r="9" fill="#ffd34e"/>
  <circle cx="30.5" cy="58" r="4.2" fill="#ffffff"/>
  <circle cx="49.5" cy="44" r="4.2" fill="#ffffff"/>
  <path d="M30.5 58 L49.5 44 L68.5 30" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" opacity="0.85"/>

  <!-- Wordmark -->
  <text x="116" y="56" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0b1b4d" letter-spacing="-0.5">Negócios</text>
  <text x="116" y="92" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="34" font-weight="400" fill="#2458e8" letter-spacing="0.5">Inteligentes</text>
</svg>
